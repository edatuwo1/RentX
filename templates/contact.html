{% extends 'base.html' %}

{% block content %}

<div class="card">


<h1>Contact RentX</h1>

<p>
    Have questions about a booking, vehicle listing,
    or becoming a host? Send us a message and we
    will get back to you as soon as possible.
</p>

<form method="POST">

    {% csrf_token %}

    <label>Name</label>

    <input
        type="text"
        name="name"
        placeholder="Enter your full name"
        required
    >

    <label>Email</label>

    <input
        type="email"
        name="email"
        placeholder="Enter your email address"
        required
    >

    <label>Message</label>

    <textarea
        name="message"
        rows="6"
        placeholder="How can we help you?"
        required
    ></textarea>

    <button
        type="submit"
        class="btn"
    >
        Send Message
    </button>

</form>


</div>

{% endblock %}
