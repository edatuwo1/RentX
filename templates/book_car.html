{% extends 'base.html' %}

{% block content %}

<h1>Book Vehicle</h1>

<h2>{{ car.title }}</h2>

<p>
    Location: {{ car.location }}
</p>

<p>
    ₦{{ car.price_per_day }} / day
</p>

<form method="POST">

    {% csrf_token %}

    <label>First Name</label>
    <input
        type="text"
        name="first_name"
        required
    >

    <br><br>

    <label>Last Name</label>
    <input
        type="text"
        name="last_name"
        required
    >

    <br><br>

    <label>Email</label>
    <input
        type="email"
        name="email"
        required
    >

    <br><br>

    <label>Pickup Date</label>
    <input
        type="date"
        name="pickup_date"
        required
    >

    <br><br>

    <label>Return Date</label>
    <input
        type="date"
        name="return_date"
        required
    >

    <br><br>

    <button type="submit">
        Confirm Booking
    </button>

</form>

{% endblock %}
